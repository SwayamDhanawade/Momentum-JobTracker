server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:job_tracker}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:CresterO3}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=${JWT_SECRET:JobTrackerSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
